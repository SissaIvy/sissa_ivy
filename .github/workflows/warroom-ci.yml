name: War Room CI

on:
  push:
    branches: [ main, codex/** ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  linux-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pytest
      - name: Run pytest
        run: pytest -q

  ui-warroom:
    runs-on: ubuntu-latest
    needs: linux-tests
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/psyops-war-room/package-lock.json
      - name: Install UI dependencies
        working-directory: ui/psyops-war-room
        run: npm ci || npm install
      - name: Lint UI
        working-directory: ui/psyops-war-room
        run: npm run lint
      - name: Type Check UI
        working-directory: ui/psyops-war-room
        run: npm run typecheck
      - name: Test UI
        working-directory: ui/psyops-war-room
        run: npm test
      - name: Build UI
        working-directory: ui/psyops-war-room
        run: npm run build
      - name: Size budget
        working-directory: ui/psyops-war-room
        run: npm run size:check
      - name: Size report
        working-directory: ui/psyops-war-room
        run: npm run size:report
      - name: Upload size artifact
        uses: actions/upload-artifact@v4
        with:
          name: warroom-size-report
          path: ui/psyops-war-room/dist/size-report.json
          if-no-files-found: error

  windows-probe:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: PowerShell version
        run: pwsh -NoLogo -Command "$PSVersionTable | Format-List *"
      - name: Run probe quick diagnostics
        shell: pwsh
        run: |
          $p = 'cogsec/collectors/Get-CogSecEndpointState.ps1'
          $json = & pwsh -NoProfile -File $p -Quick -Diagnostics -JsonPath -
          $obj = $json | ConvertFrom-Json
          if(-not $obj.host){ throw 'Missing host in JSON output' }
          if(-not $obj.schema_version){ throw 'Missing schema_version' }
      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.3.0
      - name: Run Pester
        shell: pwsh
        run: Invoke-Pester -Path 'tests/windows' -CI -Output Detailed
