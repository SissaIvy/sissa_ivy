name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run security scans daily at 2 AM UTC
    - cron: '0 2 * * *'

jobs:
  dependency-scan:
    name: Dependency Vulnerability Scan
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install safety bandit semgrep
    
    - name: Python Safety Check
      run: |
        safety check --json --output safety-report.json || true
        safety check --short-report
      continue-on-error: true
    
    - name: Bandit Security Linter
      run: |
        bandit -r cogsec/ -f json -o bandit-report.json || true
        bandit -r cogsec/ -f txt
      continue-on-error: true
    
    - name: Semgrep Security Analysis
      run: |
        semgrep --config=auto --json --output=semgrep-report.json cogsec/ || true
        semgrep --config=auto cogsec/
      continue-on-error: true
    
    - name: Upload Security Reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          safety-report.json
          bandit-report.json
          semgrep-report.json
        retention-days: 30

  secrets-scan:
    name: Secrets Detection
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: TruffleHog OSS
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified

  container-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[container]') || github.event_name == 'schedule'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Build test container
      run: |
        cat > Dockerfile.security-test << 'EOF'
        FROM python:3.11-slim
        WORKDIR /app
        COPY requirements.txt .
        RUN pip install --no-cache-dir -r requirements.txt
        COPY cogsec/ ./cogsec/
        COPY scripts/ ./scripts/
        EOF
        docker build -f Dockerfile.security-test -t sissa-ivy-security-test .
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: 'sissa-ivy-security-test'
        format: 'sarif'
        output: 'trivy-results.sarif'
    
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'

  security-scorecard:
    name: OpenSSF Scorecard
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      id-token: write
      actions: read
      contents: read
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        persist-credentials: false
    
    - name: Run analysis
      uses: ossf/scorecard-action@v2.3.1
      with:
        results_file: results.sarif
        results_format: sarif
        publish_results: true
    
    - name: Upload SARIF results
      uses: github/codeql-action/upload-sarif@v2
      with:
        sarif_file: results.sarif

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-scan, secrets-scan]
    if: always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download security reports
      uses: actions/download-artifact@v3
      with:
        name: security-reports
        path: ./security-reports/
      continue-on-error: true
    
    - name: Generate Security Summary
      run: |
        cat > security-summary.md << 'EOF'
        # Security Scan Summary
        
        **Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")
        **Commit**: ${{ github.sha }}
        **Branch**: ${{ github.ref_name }}
        
        ## Scan Results
        
        ### Dependency Vulnerabilities
        EOF
        
        if [ -f "./security-reports/safety-report.json" ]; then
          echo "✅ Safety scan completed - see artifacts for details" >> security-summary.md
        else
          echo "❌ Safety scan failed or not run" >> security-summary.md
        fi
        
        if [ -f "./security-reports/bandit-report.json" ]; then
          echo "✅ Bandit security linting completed" >> security-summary.md
        else
          echo "❌ Bandit scan failed or not run" >> security-summary.md
        fi
        
        echo "" >> security-summary.md
        echo "### Security Recommendations" >> security-summary.md
        echo "- Review all HIGH and CRITICAL findings" >> security-summary.md
        echo "- Update dependencies with known vulnerabilities" >> security-summary.md
        echo "- Address any hardcoded secrets or credentials" >> security-summary.md
        echo "- Validate secure coding practices" >> security-summary.md
        
        cat security-summary.md
    
    - name: Comment PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          if (fs.existsSync('security-summary.md')) {
            const summary = fs.readFileSync('security-summary.md', 'utf8');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: summary
            });
          }