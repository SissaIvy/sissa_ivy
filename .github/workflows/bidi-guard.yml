name: bidi-guard
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'
permissions:
  contents: read
jobs:
  check-bidi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: python scripts/check_no_bidi.py
