name: schema-lint
on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - '**'
permissions:
  contents: read
jobs:
  json-yaml-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip PyYAML
      - run: python scripts/check_json_sanity.py
      - run: python scripts/check_yaml_sanity.py
