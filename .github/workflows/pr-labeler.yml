name: pr-labeler
on:
  workflow_dispatch:
  pull_request_target:
    types: [opened, synchronize, reopened, edited]
  push:
    branches:
      - '**'
permissions:
  contents: read
  pull-requests: write
jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml
