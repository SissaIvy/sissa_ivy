name: PitCrew Dashboard (Pages)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'ui/pitcrew-dashboard/**'
      - '.github/workflows/pitcrew-pages.yml'
  workflow_dispatch:
  workflow_run:
    workflows: ["PitCrew KPI"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name != 'workflow_run' || (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: ui/pitcrew-dashboard/package.json

      - name: Install deps
        working-directory: ui/pitcrew-dashboard
        run: npm ci || npm install

      - name: Build
        working-directory: ui/pitcrew-dashboard
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ui/pitcrew-dashboard/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
